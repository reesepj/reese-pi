<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { width: 1280px; height: 640px; overflow: hidden; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #fafafa;
    background-image:
      radial-gradient(circle at 78% 32%, rgba(82, 109, 130, 0.06) 0%, rgba(82, 109, 130, 0) 55%),
      linear-gradient(180deg, #fcfcfc 0%, #f4f5f6 100%);
    color: #14171a;
    position: relative;
    display: flex;
    align-items: center;
  }

  /* faint baseline grid */
  body::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(20,23,26,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(20,23,26,0.025) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(circle at 30% 50%, #000 0%, transparent 75%);
    -webkit-mask-image: radial-gradient(circle at 30% 50%, #000 0%, transparent 75%);
  }

  .content {
    position: relative;
    z-index: 2;
    padding: 0 110px;
    max-width: 760px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #526d82;
    margin-bottom: 30px;
  }
  .eyebrow .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #526d82;
    box-shadow: 0 0 0 4px rgba(82,109,130,0.14);
  }

  .wordmark {
    font-size: 110px;
    font-weight: 800;
    letter-spacing: -0.045em;
    line-height: 0.96;
    color: #0c0f12;
  }
  .wordmark .pi { color: #526d82; }

  .tagline {
    margin-top: 26px;
    font-size: 32px;
    font-weight: 500;
    letter-spacing: -0.015em;
    color: #5b626a;
    line-height: 1.3;
  }

  .meta {
    margin-top: 46px;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  .chip {
    font-size: 16px;
    font-weight: 600;
    color: #3a4047;
    padding: 9px 18px;
    border: 1px solid rgba(20,23,26,0.10);
    border-radius: 999px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(2px);
  }

  /* geometric node accent — network of agents */
  .accent {
    position: absolute;
    right: 86px;
    top: 50%;
    transform: translateY(-50%);
    width: 360px;
    height: 360px;
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="content">
    <div class="eyebrow"><span class="dot"></span>Autonomous Agent Infrastructure</div>
    <div class="wordmark">Reese&nbsp;<span class="pi">Pi</span></div>
    <div class="tagline">One-click agent workstation.<br>Verifier loop, routing, and Pi-to-Pi orchestration.</div>
    <div class="meta">
      <span class="chip">Verifier Loop</span>
      <span class="chip">Claude Code Routing</span>
      <span class="chip">Browser Harness</span>
    </div>
  </div>

  <svg class="accent" viewBox="0 0 360 360" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- connecting lines -->
    <g stroke="#526d82" stroke-opacity="0.32" stroke-width="1.5">
      <line x1="180" y1="180" x2="180" y2="48"/>
      <line x1="180" y1="180" x2="296" y2="116"/>
      <line x1="180" y1="180" x2="300" y2="252"/>
      <line x1="180" y1="180" x2="176" y2="312"/>
      <line x1="180" y1="180" x2="58" y2="248"/>
      <line x1="180" y1="180" x2="62" y2="112"/>
    </g>
    <!-- outer nodes -->
    <g fill="#ffffff" stroke="#526d82" stroke-width="2">
      <circle cx="180" cy="48" r="13"/>
      <circle cx="296" cy="116" r="13"/>
      <circle cx="300" cy="252" r="13"/>
      <circle cx="176" cy="312" r="13"/>
      <circle cx="58" cy="248" r="13"/>
      <circle cx="62" cy="112" r="13"/>
    </g>
    <!-- subtle ring -->
    <circle cx="180" cy="180" r="120" stroke="#526d82" stroke-opacity="0.16" stroke-width="1.5" stroke-dasharray="3 7"/>
    <!-- core node -->
    <circle cx="180" cy="180" r="34" fill="#526d82"/>
    <circle cx="180" cy="180" r="34" fill="url(#g)"/>
    <circle cx="180" cy="180" r="46" stroke="#526d82" stroke-opacity="0.25" stroke-width="2"/>
    <defs>
      <radialGradient id="g" cx="0.35" cy="0.3" r="0.8">
        <stop offset="0%" stop-color="#7e98ab"/>
        <stop offset="100%" stop-color="#445a6c"/>
      </radialGradient>
    </defs>
  </svg>
</body>
</html>
